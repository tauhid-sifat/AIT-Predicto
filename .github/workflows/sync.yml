name: Sync Matches

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      dataSource:
        description: 'Data source (espn or api-football)'
        required: false
        default: 'espn'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST \
            "https://ait-predicto.vercel.app/api/sync-matches" \
            -H "Content-Type: application/json" \
            -H "x-sync-secret: ${{ secrets.SYNC_SECRET }}" \
            -d '{"dataSource":"${{ github.event.inputs.dataSource || 'espn' }}"}')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "Status: $http_code"
          echo "Response: $body"
          if [ "$http_code" -ne 200 ]; then
            exit 1
          fi
